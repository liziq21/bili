name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pubspec:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - id: pubspec
      name: Generate matrix from pubspec.yaml
      uses: flutter-actions/pubspec-matrix-action@v1
      with:
        pubspec: 'pubspec.yaml'
    outputs:
      matrix: ${{ steps.pubspec.outputs.matrix }}

  flutter_test:
    name: Run Flutter Test
    needs: pubspec
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{fromJson(needs.pubspec.outputs.matrix)}}
    permissions:
      contents: write # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    timeout-minutes: 60
    
    steps:
      - uses: actions/checkout@v6
      
      - uses: flutter-actions/setup-flutter@v2
        with:
          version: ${{ matrix.release.flutter }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Run build_runner
        run: flutter pub run build_runner build \
          --delete-conflicting-outputs \
          --verbose
          
      - name: Commit changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git status
          git add .
          git commit -m "chore: Update generated files [skip ci]"
          git push --force origin HEAD:build_runner

      - name: Run analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings > flutter_analyze.txt || true
      
      - name: Dart Analyze to SARIF
        uses: advanced-security/dart-analyzer-sarif@main
        with:
          input: flutter_analyze.txt
          output: flutter_analyze.sarif
      
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: flutter_analyze.sarif
      
      #- name: Run test
       # run: flutter test


  build_androidApp:
    name: Build Flutter App (android)
    needs: [pubspec, flutter_test]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{fromJson(needs.pubspec.outputs.matrix)}}
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"
          cache-dependency-path: |
            android/*.gradle*
            android/**/gradle-wrapper.properties
      
      - uses: flutter-actions/setup-flutter@v2
        with:
          version: ${{ matrix.release.flutter }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Run build_runner
        run: flutter pub run build_runner build \
          --delete-conflicting-outputs \
          --verbose

      - run: flutter build apk --release --split-per-abi --pub

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-release.apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk


  build_iOSApp:
    name: Build Flutter App (iOS)
    needs: [pubspec, flutter_test]
    runs-on: macos-26
    strategy:
      matrix: ${{fromJson(needs.pubspec.outputs.matrix)}}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          cache: true
          channel: stable
          flutter-version-file: pubspec.yaml
      - run: flutter pub get
      #- run: flutter doctor
      
      - name: Run build_runner
        run: dart run build_runner build \
          --delete-conflicting-outputs \
          --verbose

      - run: pod repo update
        working-directory: ios
      
      - name: Build IPA
        run: |
          flutter build ios \
            --release \
            --no-codesign \
            --verbose
          mkdir -p Payload
          mv ./build/ios/iphoneos/Runner.app Payload
          zip -r -y Payload.zip Payload/Runner.app
          mv Payload.zip Payload.ipa

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: Payload.ipa
          
      - name: IPA to catbox
        env:
           BARK_KEY: ${{ secrets.BARK_KEY }}
        id: upload-ipa-to-catbox
        run: |
          RESPONSE=$(curl -F "reqtype=fileupload" -F "time=72h" -F "fileToUpload=@Payload.ipa" https://litterbox.catbox.moe/resources/internals/api.php)
          echo "Upload response: $RESPONSE"
          curl "https://api.day.app/${BARK_KEY}/biliupdata" \
            --data-urlencode "group=actions" \
            --data-urlencode "icon=https://avatars.githubusercontent.com/u/65916846?v=4" \
            --data-urlencode "url=apple-magnifier://install?url=$RESPONSE"
